name: Build On Demand

# Builds and pushes a selected Dockerfile to GHCR on demand.
on:
  workflow_dispatch:
    inputs:
      image:
        description: "Image folder name to build (for example: php)"
        required: true
        type: string

env:
  repository: ghcr.io/userlane/tool-external-images

jobs:
  build-on-demand:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    name: Build ${{ inputs.image }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Login to Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.repository }}
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Build and push image
        run: |
          IMAGE="${{ inputs.image }}"

          if [ ! -f "$IMAGE/Dockerfile" ]; then
            echo "Dockerfile not found for image folder: $IMAGE"
            exit 1
          fi

          TAG=$(awk '/^FROM / {print $2; exit}' "$IMAGE/Dockerfile" | cut -d':' -f2)
          docker build -t ${{ env.repository }}/$IMAGE:${TAG} "$IMAGE"
          docker push ${{ env.repository }}/$IMAGE:${TAG}
